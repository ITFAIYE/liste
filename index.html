<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ankara İtfaiyesi – Taşındık</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0e27;
      color: #e8eaed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Arka plan efekti */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(230,57,70,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(99,102,241,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      background: #1a1f3a;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      position: relative;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fire-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08); }
    }

    .badge {
      display: inline-block;
      background: rgba(230,57,70,0.15);
      border: 1px solid rgba(230,57,70,0.4);
      color: #ff6b78;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 99px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #ffffff 0%, #c9cdd4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #9aa5b1;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .new-address {
      display: inline-block;
      background: rgba(230,57,70,0.1);
      border: 1px solid rgba(230,57,70,0.3);
      color: #ff8a92;
      font-weight: 700;
      font-size: 1rem;
      padding: 8px 20px;
      border-radius: 10px;
      margin: 16px 0 32px;
      letter-spacing: 0.5px;
      word-break: break-all;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #e63946 0%, #c1121f 100%);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 16px 36px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(230,57,70,0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      letter-spacing: 0.3px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(230,57,70,0.55);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 36px 0 24px;
    }

    .note {
      font-size: 0.82rem;
      color: #6c757d;
    }

    /* Countdown */
    .countdown {
      margin-top: 14px;
      font-size: 0.85rem;
      color: #9aa5b1;
    }

    .countdown span {
      color: #ff8a92;
      font-weight: 700;
    }

    @media (max-width: 520px) {
      .card { padding: 40px 28px; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <span class="fire-icon">🚒</span>
    <div class="badge">Duyuru</div>

    <h1>Taşındık!</h1>

    <p class="subtitle">Ankara İtfaiyesi Araç Kılavuzu sayfamız<br>yeni adresimize taşındı:</p>

    <div class="new-address">itfaiye.github.io</div>

    <a class="btn" href="https://itfaiye.github.io" target="_blank" rel="noopener">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
      </svg>
      Sayfayı Açmak İçin Buraya Basın
    </a>

    <hr class="divider">

    <p class="note">Lütfen yer imlerinizi güncelleyin.<br>Eski adres artık aktif değildir.</p>
  </div>



</body>
</html>
